name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install ast-grep
        run: npm install -g @ast-grep/cli

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Extract release notes from changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os, pathlib, re

          version = os.environ['GITHUB_REF_NAME'][1:]
          text = pathlib.Path('CHANGELOG.md').read_text()
          pattern = rf'^## \[{re.escape(version)}\].*?(?=^## \[|\Z)'
          match = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if not match:
              raise SystemExit(f'Missing CHANGELOG entry for {version}')
          pathlib.Path('/tmp/release-notes.md').write_text(match.group(0).strip() + '\n')
          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Verify publish payload
        run: bun run release:check

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
